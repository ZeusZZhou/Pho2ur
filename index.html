<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pho2ur - 地图海报生成器</title>
    
    <!-- 引入本地编译后的 Tailwind CSS -->
    <link rel="stylesheet" href="./dist/output.css">
    
    <!-- Leaflet Map CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- EXIF.js for GPS extraction -->
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    
    <!-- Color Thief for color extraction -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>

    <!-- html2canvas for exporting the poster -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800 h-[100dvh] overflow-hidden md:overflow-auto md:min-h-screen md:p-8 p-0">

    <!-- 移动端遮罩层 -->
    <div id="mobile-backdrop" class="fixed inset-0 bg-black/60 z-40 hidden md:hidden transition-opacity duration-300 opacity-0"></div>

    <!-- 移动端悬浮操作按钮 -->
    <button id="mobile-toggle-btn" class="md:hidden fixed bottom-2 left-1/2 -translate-x-1/2 z-[9999] w-12 h-12 flex items-center justify-center bg-black bg-opacity-20 backdrop-blur-sm text-white rounded-full shadow-md border border-white/30 transition-all active:scale-95">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>

    <div class="max-w-6xl mx-auto flex flex-col md:flex-row gap-0 md:gap-6 h-full md:h-auto">
        
        <!-- 左侧：控制台 -->
        <div id="control-panel" class="fixed bottom-0 left-0 w-full bg-white p-5 pb-10 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.15)] z-[9999] transform translate-y-full transition-transform duration-300 md:relative md:translate-y-0 md:w-1/3 md:rounded-2xl md:shadow-xl md:z-auto max-h-[85dvh] overflow-y-auto custom-scrollbar md:max-h-none md:pb-6 flex flex-col gap-5">
            
            <div class="md:hidden flex flex-col items-center mb-1">
                <div class="w-12 h-1.5 bg-gray-300 rounded-full mb-3"></div>
                <div class="w-full flex justify-between items-center">
                    <h1 class="text-xl font-bold text-gray-800">Pho<span class="text-blue-500">2ur</span></h1>
                    <button id="close-panel-btn" class="p-1.5 text-gray-500 bg-gray-100 rounded-full hover:bg-gray-200 transition">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
            </div>

            <div class="hidden md:block">
                <h1 class="text-2xl font-bold text-gray-800 mb-1">Pho<span class="text-blue-500">2ur</span></h1>
                <p class="text-xs text-gray-500">Ur photo, ur tour.</p>
            </div>
            
            <label class="block w-full p-4 border-2 border-dashed border-gray-300 rounded-xl text-center cursor-pointer hover:border-blue-500 transition bg-gray-50">
                <span class="text-gray-500 text-sm font-medium">点击或拖拽上传照片</span>
                <input type="file" id="upload" accept="image/jpeg, image/png, image/heic" class="hidden">
            </label>

            <div>
                <div class="flex justify-between items-center mb-2">
                    <h3 class="text-sm font-semibold text-gray-600">布局模式</h3>
                </div>
                <div class="flex gap-2 mb-2">
                    <button onclick="setLayoutMode('split')" id="btn-mode-split" class="flex-1 py-2 bg-blue-500 text-white rounded-lg text-sm font-medium transition focus:outline-none">分屏模式</button>
                    <button onclick="setLayoutMode('blend')" id="btn-mode-blend" class="flex-1 py-2 bg-gray-100 hover:bg-gray-200 text-gray-800 rounded-lg text-sm font-medium transition focus:outline-none">融合模式</button>
                </div>
                <div id="layer-control" class="hidden flex gap-2 mb-3">
                    <button onclick="setActiveLayer('image')" id="btn-layer-image" class="flex-1 py-1.5 bg-blue-100 text-blue-700 border border-blue-300 rounded-lg text-xs font-medium transition focus:outline-none">调整图片</button>
                    <button onclick="setActiveLayer('map')" id="btn-layer-map" class="flex-1 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-600 border border-gray-200 rounded-lg text-xs font-medium transition focus:outline-none">调整地图</button>
                </div>
                
                <div id="map-opacity-control" class="hidden flex items-center gap-3 bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <span class="text-xs text-gray-600 whitespace-nowrap">地图透明度</span>
                    <input type="range" id="map-opacity-input" min="0" max="1" step="0.05" value="1" class="w-full h-1.5 bg-gray-300 rounded-lg appearance-none cursor-pointer accent-blue-500">
                    <span id="map-opacity-val" class="text-xs text-gray-500 w-6 text-right">1.0</span>
                </div>
            </div>

            <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-sm font-semibold text-gray-600 flex items-center gap-2">
                        色彩配置
                        <span id="theme-indicator" class="text-xs font-normal text-gray-400"></span>
                    </h3>
                    <div class="flex bg-gray-200 rounded-lg p-0.5">
                        <button id="theme-light-btn" onclick="setUserTheme('light')" class="px-3 py-1 text-xs font-medium rounded-md bg-white shadow-sm text-gray-800 transition">浅色</button>
                        <button id="theme-dark-btn" onclick="setUserTheme('dark')" class="px-3 py-1 text-xs font-medium rounded-md text-gray-500 hover:text-gray-800 transition">深色</button>
                    </div>
                </div>
                
                <div class="flex items-center justify-between mb-3">
                    <span class="text-xs text-gray-500">提取调色板：</span>
                    <div id="palette-container" class="flex gap-2">
                        <span class="text-xs text-gray-400 italic">上传图片后生成</span>
                    </div>
                </div>
                <div class="flex gap-4">
                    <div class="flex items-center gap-2">
                        <input type="color" id="map-color-input" value="#6b7280">
                        <span class="text-xs text-gray-600">地图颜色</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="color" id="text-color-input" value="#1f2937">
                        <span class="text-xs text-gray-600">文字颜色</span>
                    </div>
                </div>
            </div>

            <div>
                <h3 class="text-sm font-semibold text-gray-600 mb-2">文字排版</h3>
                <div class="flex gap-2 mb-3">
                    <button onclick="setTextLayout('center')" id="btn-text-center" class="flex-1 py-2 bg-blue-500 text-white rounded-lg text-sm font-medium transition focus:outline-none">居中悬浮</button>
                    <button onclick="setTextLayout('bottom')" id="btn-text-bottom" class="flex-1 py-2 bg-gray-100 hover:bg-gray-200 text-gray-800 rounded-lg text-sm font-medium transition focus:outline-none">底部白底</button>
                </div>
                <div id="text-opacity-control" class="hidden flex items-center gap-3 bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <span class="text-xs text-gray-600 whitespace-nowrap">文字透明度</span>
                    <input type="range" id="text-opacity-input" min="0.1" max="1" step="0.05" value="1" class="w-full h-1.5 bg-gray-300 rounded-lg appearance-none cursor-pointer accent-blue-500">
                    <span id="text-opacity-val" class="text-xs text-gray-500 w-6 text-right">1.0</span>
                </div>
            </div>

            <div>
                <h3 class="text-sm font-semibold text-gray-600 mb-2">海报比例</h3>
                <div class="flex gap-2">
                    <button onclick="setRatio('3/4')" class="flex-1 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm font-medium transition focus:ring-2 focus:ring-blue-500">3:4</button>
                    <button onclick="setRatio('9/16')" class="flex-1 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm font-medium transition focus:ring-2 focus:ring-blue-500">9:16</button>
                    <button onclick="setRatio('1/1')" class="flex-1 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm font-medium transition focus:ring-2 focus:ring-blue-500">1:1</button>
                </div>
            </div>

            <div>
                <h3 class="text-sm font-semibold text-gray-600 mb-2">海报文案</h3>
                <div class="flex flex-col gap-2">
                    <input type="text" id="title-input" placeholder="主标题 (如: 纽约)" value="Unknown Area" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 text-sm">
                    <input type="text" id="subtitle-input" placeholder="副标题 (如: 坐标或描述)" value="0.0000, 0.0000" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 text-sm">
                </div>
            </div>

            <div>
                <div id="status-bar" class="text-sm font-medium text-gray-600 mb-2">等待上传照片...</div>
                <div id="manual-input-area" class="hidden flex flex-col gap-2 relative">
                    <div class="flex gap-2">
                        <input type="text" id="manual-location" placeholder="输入真实地名 (如: 纽约)" class="flex-grow px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 text-sm">
                        <button id="search-btn" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition text-sm whitespace-nowrap">搜索</button>
                    </div>
                    <ul id="search-results" class="absolute bottom-full mb-1 left-0 w-full bg-white border border-gray-200 rounded-lg shadow-xl hidden max-h-48 overflow-y-auto z-[9999] custom-scrollbar"></ul>
                </div>
            </div>

            <button id="export-btn" class="w-full py-3 bg-gray-800 text-white rounded-xl font-bold hover:bg-gray-900 transition shadow-lg flex justify-center items-center gap-2 mt-auto">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                保存海报
            </button>
        </div>

        <!-- 右侧：海报预览区 -->
        <div class="w-full h-full md:h-auto md:w-2/3 flex justify-center items-center bg-gray-200 p-4 pb-24 md:p-8 md:rounded-2xl shadow-inner overflow-hidden relative">
            <div id="poster" class="relative w-full max-w-md bg-white shadow-2xl flex flex-col overflow-hidden" style="aspect-ratio: 3 / 4;">
                <div id="content-area" class="relative flex-1 w-full flex flex-col overflow-hidden z-0 bg-white transition-colors duration-500">
                    
                    <div id="map-wrapper" class="relative flex-1 w-full bg-gray-100 transition-all duration-300 z-0">
                        <div id="map" class="absolute inset-0 z-10"></div>
                        <div id="map-tint" style="background-color: #6b7280;"></div>
                    </div>

                    <div id="image-container" class="relative flex-1 w-full bg-transparent overflow-hidden cursor-move transition-all duration-300 z-10">
                        <img id="poster-img" class="hidden" crossorigin="anonymous">
                        <div id="placeholder-text" class="absolute inset-0 flex flex-col items-center justify-center text-gray-400 pointer-events-none">
                            <span class="text-sm tracking-widest font-bold mb-1">PHOTO AREA</span>
                            <span class="text-xs opacity-70">支持双指缩放与拖拽移动</span>
                        </div>
                    </div>

                    <div id="poster-text-overlay" class="absolute top-0 left-0 w-full h-1/2 pointer-events-none z-40 flex flex-col items-center justify-center transition-all duration-300">
                        <div class="w-[80%] flex flex-col items-center justify-center">
                            <h2 id="location-name" class="font-bold tracking-wide whitespace-nowrap" style="color: #1f2937; font-size: 24px;">Unknown Area</h2>
                            <p id="location-coords" class="font-mono mt-1 whitespace-nowrap" style="color: #1f2937; font-size: 14px;">0.0000, 0.0000</p>
                        </div>
                    </div>
                </div>

                <div id="bottom-text-bar" class="hidden relative w-full bg-white px-4 flex-none justify-between items-center z-50 border-t border-gray-100 h-[60px]">
                    <div class="text-base font-bold text-gray-800 tracking-tight">Pho<span id="logo-2ur" style="color: #1f2937;">2ur</span></div>
                    <div id="bottom-text-content" class="text-right flex flex-col justify-center transition-opacity duration-200 max-w-[60%] overflow-hidden">
                        <h2 id="bottom-location-name" class="font-bold whitespace-nowrap" style="color: #1f2937; font-size: 14px;">Unknown Area</h2>
                        <p id="bottom-location-coords" class="font-mono mt-0.5 whitespace-nowrap" style="color: #1f2937; font-size: 10px;">0.0000, 0.0000</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入拆分后的 JS 文件 -->
    <script src="./js/main.js"></script>
</body>
</html>
